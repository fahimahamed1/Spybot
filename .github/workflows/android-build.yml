name: Build Android APK

on:
  push:
    branches: [ main ]
    paths: [ 'app/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'app/**' ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'APK build type'
        required: true
        default: 'release'
        type: choice
        options: ['debug', 'release', 'both']
      create_release:
        description: 'Create GitHub release?'
        required: true
        default: 'yes'
        type: choice
        options: ['yes', 'no']
      custom_version:
        description: 'Custom version tag'
        required: false
        default: ''
        type: string
      prerelease:
        description: 'Mark as pre-release?'
        required: true
        default: 'no'
        type: choice
        options: ['yes', 'no']

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BUILD_TYPE: ${{ github.event.inputs.build_type || 'release' }}
      CREATE_RELEASE: ${{ github.event.inputs.create_release || 'yes' }}
      IS_PRERELEASE: ${{ github.event.inputs.prerelease || 'no' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          # Robust search: Find build.gradle (or .kts) specifically inside an 'app' module directory.
          # This avoids matching the root project build.gradle or gradle cache files.
          GRADLE_FILE=$(find ./app -path "*/app/build.gradle*" -not -path "*/.gradle/*" -not -path "*/build/*" -type f | head -n 1)
          
          if [ -z "$GRADLE_FILE" ]; then
            echo "Error: Module build.gradle not found."
            echo "Looking for files to debug:"
            find ./app -name "*.gradle*" -type f
            exit 1
          fi
          
          echo "Using build file: $GRADLE_FILE"
          
          # Extract version details (Handles standard formatting)
          VERSION_NAME=$(grep "versionName" "$GRADLE_FILE" | sed 's/.*versionName[ =]*"\{0,1\}//' | sed 's/".*//')
          VERSION_CODE=$(grep "versionCode" "$GRADLE_FILE" | sed 's/.*versionCode[ =]*//')
          
          CUSTOM_VERSION="${{ github.event.inputs.custom_version }}"
          if [ -n "$CUSTOM_VERSION" ]; then
            VERSION_NAME="$CUSTOM_VERSION"
          fi
          
          # Fallback if versionName is empty
          if [ -z "$VERSION_NAME" ]; then
            VERSION_NAME="1.0.0-$(git rev-parse --short HEAD)"
          fi

          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Detected Version: $VERSION_NAME ($VERSION_CODE)"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Build APK
        working-directory: ./app
        run: |
          chmod +x gradlew
          
          echo "Building type: ${{ env.BUILD_TYPE }}"
          
          case "${{ env.BUILD_TYPE }}" in
            debug) ./gradlew assembleDebug ;;
            release) ./gradlew assembleRelease ;;
            both) ./gradlew assembleDebug assembleRelease ;;
            *) ./gradlew assembleRelease ;;
          esac

      - name: Prepare APKs
        id: apk
        run: |
          VERSION="${{ steps.version.outputs.version_name }}"
          
          echo "Initializing output variables..."
          echo "debug_apk=" >> $GITHUB_OUTPUT
          echo "release_apk=" >> $GITHUB_OUTPUT
          
          # Dynamic APK Finder
          # Finds any apk in the output directories recursively
          
          if [[ "${{ env.BUILD_TYPE }}" == "debug" || "${{ env.BUILD_TYPE }}" == "both" ]]; then
            DEBUG_APK=$(find ./app -name "*.apk" -path "*debug*" -type f | head -n 1)
            if [ -n "$DEBUG_APK" ]; then
              FILENAME="Spybot-v${VERSION}-debug.apk"
              cp "$DEBUG_APK" "./$FILENAME"
              echo "debug_apk=$FILENAME" >> $GITHUB_OUTPUT
              echo "Prepared Debug APK: $FILENAME"
            else
              echo "Warning: Debug build selected, but APK not found."
            fi
          fi

          if [[ "${{ env.BUILD_TYPE }}" == "release" || "${{ env.BUILD_TYPE }}" == "both" ]]; then
            RELEASE_APK=$(find ./app -name "*.apk" -path "*release*" -type f | head -n 1)
            if [ -n "$RELEASE_APK" ]; then
              FILENAME="Spybot-v${VERSION}-release.apk"
              cp "$RELEASE_APK" "./$FILENAME"
              echo "release_apk=$FILENAME" >> $GITHUB_OUTPUT
              echo "Prepared Release APK: $FILENAME"
            else
              echo "Warning: Release build selected, but APK not found."
            fi
          fi

      - name: Upload Debug APK
        if: steps.apk.outputs.debug_apk != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.debug_apk }}
          path: ./${{ steps.apk.outputs.debug_apk }}
          retention-days: 30

      - name: Upload Release APK
        if: steps.apk.outputs.release_apk != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.release_apk }}
          path: ./${{ steps.apk.outputs.release_apk }}
          retention-days: 30

      - name: Create Release
        if: |
          github.ref == 'refs/heads/main' &&
          (
            github.event_name == 'push' ||
            (github.event_name == 'workflow_dispatch' && env.CREATE_RELEASE == 'yes')
          )
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version_name }}
          name: Spybot v${{ steps.version.outputs.version_name }}
          files: |
            ${{ steps.apk.outputs.debug_apk }}
            ${{ steps.apk.outputs.release_apk }}
          prerelease: ${{ env.IS_PRERELEASE == 'yes' }}
          generate_release_notes: true
          body: |
            ## Spybot v${{ steps.version.outputs.version_name }}

            - Version Code: ${{ steps.version.outputs.version_code }}
            - Build Type: ${{ env.BUILD_TYPE }}

            Built automatically from main branch.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
